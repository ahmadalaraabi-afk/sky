<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>تقرير السماء اليوم</title>

<style>

body{
font-family:Arial;
direction:rtl;
text-align:center;
background:#021028;
color:white;
padding:40px;
}

h1{
color:#FFD700;
}

.box{
margin:20px auto;
padding:20px;
background:#031a3a;
width:350px;
border-radius:10px;
}

button{
background:#1DA1F2;
border:none;
padding:12px 20px;
color:white;
font-size:16px;
border-radius:8px;
cursor:pointer;
}

</style>

</head>

<body>

<h1>🔭 تقرير السماء اليوم</h1>

<div class="box">

📍 مكة المكرمة

<br><br>

☀️ <b>الشمس</b>

<p id="sun"></p>

<p id="sunTimes"></p>

<br>

🌙 <b>القمر</b>

<p id="moon"></p>

<br>

📅 <b>التاريخ</b>

<p id="date"></p>

<br>

<button onclick="tweet()">🐦 نشر التقرير في تويتر</button>

</div>


<script>

// التاريخ

let today=new Date()

document.getElementById("date").innerHTML=
today.toLocaleDateString('ar-SA')


// منازل القمر

const manazil=[
"الشرطان","البطين","الثريا","الدبران","الهقعة","الهنعة",
"الذراع","النثرة","الطرف","الجبهة","الزبرة","الصرفة",
"العواء","السماك","الغفر","الزبانا","الإكليل","القلب",
"الشولة","النعائم","البلدة","سعد الذابح","سعد بلع",
"سعد السعود","سعد الأخبية","الفرغ المقدم","الفرغ المؤخر","بطن الحوت"
]


// حساب يوم السنة

let dayOfYear=Math.floor(
(today-new Date(today.getFullYear(),0,0))/86400000
)


// حساب منزلة الشمس

let sunIndex=Math.floor((dayOfYear%365)/13)

let sunM=manazil[sunIndex]

// المنزلة التراثية (التي قبلها)

let heritageIndex=sunIndex-1

if(heritageIndex<0){
heritageIndex=27
}

let heritageManzil=manazil[heritageIndex]


document.getElementById("sun").innerHTML=
"المنزلة الفلكية: "+sunM+
"<br>المنزلة التراثية: "+heritageManzil



// القمر

const constellations=[
"الحمل","الثور","الجوزاء","السرطان","الأسد","العذراء",
"الميزان","العقرب","القوس","الجدي","الدلو","الحوت"
]

let moonConst=constellations[today.getDate()%12]

let moonM=manazil[today.getDate()%28]

document.getElementById("moon").innerHTML=
"القمر في كوكبة: "+moonConst+
"<br>منزلة القمر: "+moonM



// شروق وغروب الشمس غداً

let tomorrow=new Date()

tomorrow.setDate(tomorrow.getDate()+1)

let date=tomorrow.toISOString().split("T")[0]

fetch(`https://api.sunrise-sunset.org/json?lat=21.3891&lng=39.8579&date=${date}&formatted=0`)
.then(res=>res.json())
.then(data=>{

let rise=new Date(data.results.sunrise)
let set=new Date(data.results.sunset)

document.getElementById("sunTimes").innerHTML=
"🌅 شروق الشمس غداً: "+
"<b>"+rise.toLocaleTimeString('ar-SA',{hour:'2-digit',minute:'2-digit'})+"</b>"+
"<br>🌇 غروب الشمس غداً: "+
"<b>"+set.toLocaleTimeString('ar-SA',{hour:'2-digit',minute:'2-digit'})+"</b>"

})


// زر تويتر

function tweet(){

let text=
"🌌 تقرير السماء اليوم فوق مكة\n"+
"☀️ المنزلة الفلكية: "+sunM+"\n"+
"⭐ المنزلة التراثية: "+heritageManzil+"\n"+
"🌙 القمر في كوكبة: "+moonConst+"\n"+
"⭐ منزلة القمر: "+moonM+"\n"+
"https://ahmadalaraabi-afk.github.io/sky"

let url=
"https://twitter.com/intent/tweet?text="+encodeURIComponent(text)

window.open(url)

}

</script>

</body>
</html>
