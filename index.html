<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>تقرير السماء - مكة</title>

<style>
body{
font-family:Arial;
direction:rtl;
text-align:right;
padding:40px;
}
</style>

</head>

<body>

<h2>🌌 تقرير السماء اليوم</h2>

<p>📍 مكة المكرمة</p>

<h3>☀️ الشمس</h3>
<p id="suninfo">جارٍ الحساب...</p>

<h3>🌙 القمر</h3>
<p id="mooninfo">جارٍ الحساب...</p>

<script>

// إحداثيات مكة
const lat = 21.3891;
const lon = 39.8579;


// ======================
// حساب RA الشمس (أدق)
// ======================
function getSunRA(date){

const J2000 = new Date("2000-01-01T12:00:00Z");
const days = (date - J2000) / 86400000;

let L = 280.46 + 0.9856474 * days;
let g = 357.528 + 0.9856003 * days;

L = L % 360;
g = g % 360;

let lambda =
L +
1.915 * Math.sin(g * Math.PI/180) +
0.020 * Math.sin(2*g * Math.PI/180);

let epsilon = 23.439;

let RA =
Math.atan2(
Math.cos(epsilon*Math.PI/180) * Math.sin(lambda*Math.PI/180),
Math.cos(lambda*Math.PI/180)
) * 180/Math.PI;

if(RA < 0) RA += 360;

return RA;

}


// ======================
// جدول منازل القمر
// ======================
const manazil = [

{name:"الشرطان",ra:15},
{name:"البطين",ra:28},
{name:"الثريا",ra:42},
{name:"الدبران",ra:56},
{name:"الهقعة",ra:70},
{name:"الهنعة",ra:84},
{name:"الذراع",ra:98},
{name:"النثرة",ra:112},
{name:"الطرف",ra:126},
{name:"الجبهة",ra:140},
{name:"الزبرة",ra:154},
{name:"الصرفة",ra:168},
{name:"العواء",ra:182},
{name:"السماك",ra:196},
{name:"الغفر",ra:210},
{name:"الزبانا",ra:224},
{name:"الإكليل",ra:238},
{name:"القلب",ra:252},
{name:"الشولة",ra:266},
{name:"النعائم",ra:280},
{name:"البلدة",ra:294},
{name:"سعد الذابح",ra:308},
{name:"سعد بلع",ra:322},
{name:"سعد السعود",ra:336},
{name:"سعد الأخبية",ra:350},
{name:"الفرغ المقدم",ra:4},
{name:"الفرغ المؤخر",ra:8},
{name:"بطن الحوت",ra:12}

];


// ======================
// إيجاد أقرب منزلة
// ======================
function angularDistance(a,b){
let d = Math.abs(a-b);
return Math.min(d,360-d);
}

function getNearestManzil(ra){

let nearest = manazil[0];
let minDiff = angularDistance(ra,manazil[0].ra);

for(const m of manazil){

let diff = angularDistance(ra,m.ra);

if(diff < minDiff){
minDiff = diff;
nearest = m;
}

}

return nearest;

}


// ======================
// جلب وقت الشروق
// ======================
fetch(`https://api.sunrise-sunset.org/json?lat=${lat}&lng=${lon}&formatted=0`)
.then(res => res.json())
.then(data => {

let sunrise = new Date(data.results.sunrise);

// الشمس قبل الشروق بساعة
let sunTime = new Date(sunrise.getTime() - 60*60*1000);

// حساب RA
let sunRA = getSunRA(sunTime);

// أقرب منزلة
let manzila = getNearestManzil(sunRA);


// المنزلة التراثية الظاهرة
let visibleManzila = "سعد السعود";


// القمر بعد الشروق بساعتين
let moonTime = new Date(sunrise.getTime() + 2*60*60*1000);


// عرض النتائج
document.getElementById("suninfo").innerHTML =
"الشمس قبل الشروق بساعة: "
+ sunTime.toLocaleTimeString() +
"<br>RA الشمس: "
+ sunRA.toFixed(2) + "°" +
"<br>المنزلة الفلكية: "
+ manzila.name +
"<br>المنزلة التراثية الظاهرة: "
+ visibleManzila;


document.getElementById("mooninfo").innerHTML =
"الحساب بعد الشروق بساعتين: "
+ moonTime.toLocaleTimeString();

});

</script>

</body>
</html>
